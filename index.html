<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zenkari Music Pro - Secure</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-app: #09090b;
            --bg-sidebar: #121214;
            --bg-player: #18181b;
            --bg-hover: #27272a;
            --primary: #3b82f6;
            --primary-hover: #2563eb;
            --text-main: #ffffff;
            --text-muted: #a1a1aa;
            --border: #27272a;
            --danger: #ef4444;
            --success: #22c55e;
            --radius: 8px;
            --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.5);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: var(--bg-app);
            color: var(--text-main);
            height: 100vh;
            overflow: hidden;
        }

        /* --- LOGIN SCREEN --- */
        #login-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--bg-app);
            z-index: 9999;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .login-card {
            background: var(--bg-sidebar);
            padding: 40px;
            border-radius: 16px;
            border: 1px solid var(--border);
            width: 100%;
            max-width: 450px;
            text-align: center;
        }

        .login-logo {
            width: 150px;
            height: 150px;
            object-fit: contain;
            margin-bottom: 20px;
            border-radius: 12px;
        }

        .login-title {
            font-size: 22px;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .login-sub {
            color: var(--text-muted);
            font-size: 14px;
            margin-bottom: 30px;
        }

        .input-group {
            margin-bottom: 20px;
            text-align: left;
        }

        .input-label {
            display: block;
            font-size: 12px;
            color: var(--text-muted);
            margin-bottom: 8px;
            font-weight: 500;
        }

        .zen-input {
            width: 100%;
            padding: 12px;
            background: var(--bg-app);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            color: var(--text-main);
            font-size: 14px;
        }

        .zen-input:focus {
            outline: none;
            border-color: var(--primary);
        }

        .btn-primary {
            width: 100%;
            padding: 12px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: var(--radius);
            font-weight: 600;
            cursor: pointer;
            font-size: 14px;
        }

        .btn-primary:hover {
            background: var(--primary-hover);
        }

        .btn-secondary {
            width: 100%;
            padding: 12px;
            background: var(--bg-hover);
            color: white;
            border: 1px solid var(--border);
            border-radius: var(--radius);
            font-weight: 600;
            cursor: pointer;
            font-size: 14px;
            margin-top: 10px;
        }

        .btn-secondary:hover {
            background: var(--border);
        }

        .btn-link {
            background: none;
            border: none;
            color: var(--primary);
            cursor: pointer;
            font-size: 13px;
            text-decoration: underline;
            margin-top: 15px;
        }

        .file-drop-area {
            border: 2px dashed var(--border);
            border-radius: var(--radius);
            padding: 20px;
            margin-top: 20px;
            cursor: pointer;
            background: rgba(255,255,255,0.02);
        }

        .file-drop-area:hover {
            border-color: var(--primary);
        }

        /* --- MAIN APP --- */
        #app-container {
            display: none;
            height: 100vh;
            grid-template-columns: 260px 1fr;
            grid-template-rows: 1fr 90px;
        }

        .sidebar {
            background: var(--bg-sidebar);
            border-right: 1px solid var(--border);
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 24px;
        }

        .brand {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            margin-bottom: 10px;
        }

        .brand-img {
            width: 80px;
            height: 80px;
            border-radius: 12px;
        }

        .brand-text {
            font-size: 18px;
            font-weight: 700;
        }

        .nav-section {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .nav-title {
            font-size: 11px;
            text-transform: uppercase;
            color: var(--text-muted);
            font-weight: 600;
            padding-left: 12px;
        }

        .nav-item {
            padding: 10px 12px;
            border-radius: var(--radius);
            color: var(--text-muted);
            font-size: 14px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .nav-item:hover {
            background: var(--bg-hover);
            color: var(--text-main);
        }

        .nav-item.active {
            background: var(--bg-hover);
            color: var(--primary);
        }

        .main-view {
            background: var(--bg-app);
            overflow-y: auto;
        }

        .top-bar {
            position: sticky;
            top: 0;
            background: rgba(9, 9, 11, 0.8);
            backdrop-filter: blur(10px);
            padding: 20px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border);
            z-index: 10;
        }

        .search-bar {
            background: var(--bg-sidebar);
            border: 1px solid var(--border);
            padding: 8px 16px;
            border-radius: 20px;
            width: 300px;
            color: var(--text-main);
            font-size: 13px;
        }

        .btn-icon {
            background: var(--bg-sidebar);
            border: 1px solid var(--border);
            color: var(--text-main);
            width: 36px;
            height: 36px;
            border-radius: 50%;
            cursor: pointer;
        }

        .btn-icon:hover {
            background: var(--bg-hover);
        }

        .video-stage {
            width: 100%;
            height: 400px;
            background: #000;
            display: flex;
            align-items: center;
            justify-content: center;
            border-bottom: 1px solid var(--border);
        }

        .video-stage video {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        .video-placeholder {
            color: var(--text-muted);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }

        .playlist-header {
            padding: 20px 30px;
            display: grid;
            grid-template-columns: 40px 4fr 3fr 1fr;
            color: var(--text-muted);
            font-size: 12px;
            text-transform: uppercase;
            border-bottom: 1px solid var(--border);
        }

        .track-list {
            padding: 0 30px;
        }

        .track-row {
            display: grid;
            grid-template-columns: 40px 4fr 3fr 1fr;
            padding: 10px 0;
            border-radius: var(--radius);
            align-items: center;
            cursor: pointer;
            color: var(--text-muted);
        }

        .track-row:hover {
            background: var(--bg-hover);
            color: var(--text-main);
        }

        .track-row.playing {
            color: var(--primary);
        }

        .track-row.playing .track-num {
            display: none;
        }

        .track-row.playing .track-icon {
            display: block;
        }

        .track-icon {
            display: none;
            font-size: 14px;
        }

        .track-info {
            display: flex;
            flex-direction: column;
        }

        .track-title {
            font-size: 14px;
            font-weight: 500;
            color: var(--text-main);
            margin-bottom: 4px;
        }

        .track-artist {
            font-size: 12px;
        }

        .player-bar {
            grid-column: 1 / -1;
            background: var(--bg-player);
            border-top: 1px solid var(--border);
            padding: 0 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            z-index: 20;
        }

        .player-left {
            width: 30%;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .now-playing-art {
            width: 56px;
            height: 56px;
            background: var(--bg-hover);
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .now-playing-info {
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .np-title {
            font-size: 13px;
            font-weight: 600;
        }

        .np-artist {
            font-size: 11px;
            color: var(--text-muted);
        }

        .player-center {
            width: 40%;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
        }

        .player-controls {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .ctrl-btn {
            background: none;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            font-size: 16px;
        }

        .ctrl-btn:hover {
            color: var(--text-main);
        }

        .ctrl-btn.play-pause {
            width: 32px;
            height: 32px;
            background: var(--text-main);
            color: var(--bg-app);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
        }

        .progress-container {
            width: 100%;
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 11px;
            color: var(--text-muted);
        }

        .progress-bar-bg {
            flex: 1;
            height: 4px;
            background: var(--bg-hover);
            border-radius: 2px;
            cursor: pointer;
        }

        .progress-bar-fill {
            height: 100%;
            background: var(--text-main);
            border-radius: 2px;
            width: 0%;
        }

        .player-right {
            width: 30%;
            display: flex;
            justify-content: flex-end;
            align-items: center;
            gap: 10px;
        }

        .volume-slider {
            width: 100px;
            height: 4px;
            -webkit-appearance: none;
            background: var(--bg-hover);
            border-radius: 2px;
        }

        .volume-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 12px;
            height: 12px;
            background: var(--text-muted);
            border-radius: 50%;
            cursor: pointer;
        }

        /* Modal */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(4px);
            z-index: 1000;
            display: none;
            align-items: center;
            justify-content: center;
        }

        .modal-content {
            background: var(--bg-sidebar);
            padding: 30px;
            border-radius: 12px;
            width: 500px;
            border: 1px solid var(--border);
        }

        .modal-header {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
        }

        .close-modal {
            cursor: pointer;
            color: var(--text-muted);
        }

        .modal-body {
            margin-bottom: 20px;
        }

        .status-msg {
            font-size: 12px;
            margin-top: 10px;
            text-align: center;
        }

        .status-success { color: var(--success); }
        .status-error { color: var(--danger); }

        .password-strength {
            height: 4px;
            background: var(--bg-hover);
            border-radius: 2px;
            margin-top: 8px;
        }

        .password-strength-bar {
            height: 100%;
            width: 0%;
            transition: all 0.3s;
        }

        .strength-weak { background: var(--danger); width: 33%; }
        .strength-medium { background: #f59e0b; width: 66%; }
        .strength-strong { background: var(--success); width: 100%; }
    </style>
</head>
<body>

    <!-- LOGIN SCREEN -->
    <div id="login-screen">
        <div class="login-card">
            <img src="https://image.qwenlm.ai/public_source/ff29c596-e004-4018-9f86-2e7894a52ae0/136eb1e83-8b32-4b0c-bf4c-86f624b354e0.png" alt="Zenkari Logo" class="login-logo">
            <div class="login-title">ZENKARI PRO</div>
            <div class="login-sub">Système de lecture multimédia sécurisé</div>
            
            <div class="input-group">
                <label class="input-label">Nom d'utilisateur</label>
                <input type="text" id="login-username" class="zen-input" placeholder="Votre nom">
            </div>

            <div class="input-group">
                <label class="input-label">Mot de passe</label>
                <input type="password" id="login-pass" class="zen-input" placeholder="••••••">
            </div>

            <button class="btn-primary" id="btn-login" onclick="attemptLogin()">Connexion</button>
            <button class="btn-link" id="btn-create-account" onclick="openRegisterModal()">Créer un compte</button>
            
            <div style="margin-top: 25px; border-top: 1px solid var(--border); padding-top: 20px;">
                <div class="input-group">
                    <label class="input-label">Bibliothèque (.json ou .enc)</label>
                    <div class="file-drop-area" id="file-drop" onclick="document.getElementById('lib-file').click()">
                        <span id="file-name-display">Importer un fichier</span>
                        <input type="file" id="lib-file" accept=".json,.enc" onchange="handleFileSelect(this)">
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- REGISTER MODAL -->
    <div class="modal-overlay" id="register-modal">
        <div class="modal-content">
            <div class="modal-header">
                <span>Créer un compte</span>
                <span class="close-modal" onclick="closeRegisterModal()">✕</span>
            </div>
            <div class="modal-body">
                <div class="input-group">
                    <label class="input-label">Nom d'utilisateur</label>
                    <input type="text" id="reg-username" class="zen-input" placeholder="Nom d'utilisateur">
                </div>
                <div class="input-group">
                    <label class="input-label">Mot de passe</label>
                    <input type="password" id="reg-pass" class="zen-input" placeholder="••••••" oninput="checkPasswordStrength()">
                    <div class="password-strength">
                        <div class="password-strength-bar" id="pass-strength-bar"></div>
                    </div>
                </div>
                <div class="input-group">
                    <label class="input-label">Confirmer le mot de passe</label>
                    <input type="password" id="reg-pass-confirm" class="zen-input" placeholder="••••••">
                </div>
                <button class="btn-primary" id="btn-register" onclick="registerAccount()">Créer le compte</button>
                <div id="reg-status" class="status-msg"></div>
            </div>
        </div>
    </div>

    <!-- MAIN APP -->
    <div id="app-container">
        <!-- Sidebar -->
        <div class="sidebar">
            <div class="brand">
                <img src="https://image.qwenlm.ai/public_source/ff29c596-e004-4018-9f86-2e7894a52ae0/136eb1e83-8b32-4b0c-bf4c-86f624b354e0.png" alt="Logo" class="brand-img">
                <div class="brand-text">ZENKARI</div>
            </div>

            <div class="nav-section">
                <div class="nav-title">Menu</div>
                <div class="nav-item active" id="nav-library" onclick="switchView('library')">
                    <span>📚</span> Bibliothèque
                </div>
                <div class="nav-item" id="nav-favorites" onclick="switchView('favorites')">
                    <span>❤️</span> Favoris
                </div>
            </div>

            <div class="nav-section">
                <div class="nav-title">Compte</div>
                <div class="nav-item" id="user-display">
                    <span>👤</span> <span id="username-display">Utilisateur</span>
                </div>
                <div class="nav-item" id="nav-settings" onclick="openSettings()">
                    <span>⚙️</span> Paramètres
                </div>
                <div class="nav-item" id="nav-logout" onclick="logout()">
                    <span>🚪</span> Déconnexion
                </div>
            </div>
        </div>

        <!-- Main View -->
        <div class="main-view">
            <div class="top-bar">
                <input type="text" class="search-bar" id="search-input" placeholder="Rechercher..." oninput="filterTracks(this.value)">
                <div class="user-actions">
                    <button class="btn-icon" id="btn-add-files" onclick="document.getElementById('add-files').click()">+</button>
                    <input type="file" id="add-files" multiple accept="audio/*,video/*" onchange="addLocalFiles(this.files)">
                </div>
            </div>

            <div class="video-stage" id="video-stage">
                <video id="main-video"></video>
                <div class="video-placeholder" id="video-placeholder">
                    <span style="font-size: 40px; opacity: 0.2;">▶</span>
                    <span>Lecteur Prêt</span>
                </div>
            </div>

            <div class="playlist-header">
                <div>#</div>
                <div>TITRE</div>
                <div>ALBUM</div>
                <div>DURÉE</div>
            </div>
            <div class="track-list" id="track-list-container"></div>
        </div>

        <!-- Player Bar -->
        <div class="player-bar">
            <div class="player-left">
                <div class="now-playing-art" id="np-art">♫</div>
                <div class="now-playing-info">
                    <div class="np-title" id="np-title">Aucune lecture</div>
                    <div class="np-artist" id="np-artist">--</div>
                </div>
                <button class="btn-icon" id="btn-like" style="width: 24px; height: 24px;" onclick="toggleLike()">♥</button>
            </div>

            <div class="player-center">
                <div class="player-controls">
                    <button class="ctrl-btn" id="btn-prev" onclick="prevTrack()">⏮</button>
                    <button class="ctrl-btn play-pause" id="btn-play" onclick="togglePlay()">▶</button>
                    <button class="ctrl-btn" id="btn-next" onclick="nextTrack()">⏭</button>
                </div>
                <div class="progress-container">
                    <span id="curr-time">0:00</span>
                    <div class="progress-bar-bg" id="progress-bar" onclick="seek(event)">
                        <div class="progress-bar-fill" id="progress-fill"></div>
                    </div>
                    <span id="total-time">0:00</span>
                </div>
            </div>

            <div class="player-right">
                <span>🔊</span>
                <input type="range" class="volume-slider" id="volume-slider" min="0" max="1" step="0.01" value="0.8" oninput="setVolume(this.value)">
            </div>
        </div>
    </div>

    <!-- Settings Modal -->
    <div class="modal-overlay" id="settings-modal">
        <div class="modal-content">
            <div class="modal-header">
                <span>Gestion des Données</span>
                <span class="close-modal" onclick="closeModal()">✕</span>
            </div>
            <div class="modal-body">
                <p style="font-size: 13px; color: var(--text-muted); margin-bottom: 15px;">
                    Exportez votre bibliothèque.
                </p>
                <button class="btn-primary" id="btn-export-enc" onclick="exportLibrary(true)">💾 JSON Crypté (.enc)</button>
                <button class="btn-secondary" id="btn-export-json" onclick="exportLibrary(false)">📄 JSON Standard (.json)</button>
                <div id="save-status" class="status-msg"></div>
            </div>
        </div>
    </div>

    <script>
        // Global State
        let library = [];
        let currentTrackIndex = -1;
        let isPlaying = false;
        let currentUser = null;
        let userPassword = null;
        let audioContext = null;
        let sourceNode = null;
        let gainNode = null;

        // DOM Elements
        const videoEl = document.getElementById('main-video');
        const playBtn = document.getElementById('btn-play');
        const progressFill = document.getElementById('progress-fill');
        const currTimeEl = document.getElementById('curr-time');
        const totalTimeEl = document.getElementById('total-time');
        const npTitle = document.getElementById('np-title');
        const npArtist = document.getElementById('np-artist');
        const videoPlaceholder = document.getElementById('video-placeholder');

        // Crypto Functions
        function encryptData(data, password) {
            const str = JSON.stringify(data);
            let result = '';
            for (let i = 0; i < str.length; i++) {
                const charCode = str.charCodeAt(i) ^ password.charCodeAt(i % password.length);
                result += String.fromCharCode(charCode);
            }
            return btoa(result);
        }

        function decryptData(encryptedBase64, password) {
            try {
                const str = atob(encryptedBase64);
                let result = '';
                for (let i = 0; i < str.length; i++) {
                    const charCode = str.charCodeAt(i) ^ password.charCodeAt(i % password.length);
                    result += String.fromCharCode(charCode);
                }
                return JSON.parse(result);
            } catch (e) {
                return null;
            }
        }

        // User Management
        function getUsers() {
            try {
                const users = localStorage.getItem('zenkari_users');
                return users ? JSON.parse(users) : {};
            } catch (e) {
                return {};
            }
        }

        function saveUser(username, passwordHash) {
            const users = getUsers();
            users[username] = { passwordHash, createdAt: new Date().toISOString() };
            localStorage.setItem('zenkari_users', JSON.stringify(users));
        }

        function getUser(username) {
            const users = getUsers();
            return users[username];
        }

        function saveUserLibrary(username, libraryData) {
            localStorage.setItem('zenkari_library_' + username, JSON.stringify(libraryData));
        }

        function getUserLibrary(username) {
            try {
                const data = localStorage.getItem('zenkari_library_' + username);
                return data ? JSON.parse(data) : [];
            } catch (e) {
                return [];
            }
        }

        // Register Functions
        function openRegisterModal() {
            document.getElementById('register-modal').style.display = 'flex';
        }

        function closeRegisterModal() {
            document.getElementById('register-modal').style.display = 'none';
            document.getElementById('reg-status').textContent = '';
            document.getElementById('reg-username').value = '';
            document.getElementById('reg-pass').value = '';
            document.getElementById('reg-pass-confirm').value = '';
            document.getElementById('pass-strength-bar').className = 'password-strength-bar';
        }

        function checkPasswordStrength() {
            const pass = document.getElementById('reg-pass').value;
            const bar = document.getElementById('pass-strength-bar');
            
            let strength = 0;
            if (pass.length >= 8) strength++;
            if (/[A-Z]/.test(pass)) strength++;
            if (/[0-9]/.test(pass)) strength++;
            if (/[^A-Za-z0-9]/.test(pass)) strength++;

            bar.className = 'password-strength-bar';
            if (strength <= 1) bar.classList.add('strength-weak');
            else if (strength <= 2) bar.classList.add('strength-medium');
            else if (strength >= 3) bar.classList.add('strength-strong');
        }

        function registerAccount() {
            const username = document.getElementById('reg-username').value.trim();
            const pass = document.getElementById('reg-pass').value;
            const passConfirm = document.getElementById('reg-pass-confirm').value;
            const statusEl = document.getElementById('reg-status');

            if (!username || !pass) {
                statusEl.textContent = 'Veuillez remplir tous les champs';
                statusEl.className = 'status-msg status-error';
                return;
            }

            if (pass !== passConfirm) {
                statusEl.textContent = 'Les mots de passe ne correspondent pas';
                statusEl.className = 'status-msg status-error';
                return;
            }

            if (pass.length < 6) {
                statusEl.textContent = 'Le mot de passe doit contenir au moins 6 caractères';
                statusEl.className = 'status-msg status-error';
                return;
            }

            const users = getUsers();
            if (users[username]) {
                statusEl.textContent = 'Ce nom d\'utilisateur existe déjà';
                statusEl.className = 'status-msg status-error';
                return;
            }

            // Simple hash (not secure for production, but works for demo)
            const passwordHash = btoa(pass);
            saveUser(username, passwordHash);
            
            statusEl.textContent = 'Compte créé avec succès ! Connectez-vous maintenant.';
            statusEl.className = 'status-msg status-success';
            
            setTimeout(() => {
                closeRegisterModal();
            }, 2000);
        }

        // Login Functions
        function handleFileSelect(input) {
            const file = input.files[0];
            if (file) {
                document.getElementById('file-name-display').textContent = file.name;
                document.getElementById('file-name-display').style.color = 'var(--primary)';
            }
        }

        function attemptLogin() {
            const username = document.getElementById('login-username').value.trim();
            const pass = document.getElementById('login-pass').value;
            const fileInput = document.getElementById('lib-file');
            const file = fileInput.files[0];

            if (!username) {
                alert('Veuillez entrer un nom d\'utilisateur');
                return;
            }

            const user = getUser(username);
            
            if (user) {
                const passwordHash = btoa(pass);
                if (passwordHash !== user.passwordHash) {
                    alert('Mot de passe incorrect');
                    return;
                }
                userPassword = pass;
            } else {
                const passwordHash = btoa(pass);
                saveUser(username, passwordHash);
                userPassword = pass;
            }

            currentUser = username;
            document.getElementById('username-display').textContent = username;

            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    const content = e.target.result;
                    let data = null;

                    const isEncrypted = file.name.endsWith('.enc');

                    if (isEncrypted) {
                        data = decryptData(content, userPassword);
                        if (!data) {
                            alert('Erreur: Fichier crypté invalide');
                            return;
                        }
                    } else {
                        try {
                            data = JSON.parse(content);
                        } catch (err) {
                            alert('Erreur: Format JSON invalide');
                            return;
                        }
                    }

                    if (Array.isArray(data)) {
                        library = data;
                        saveUserLibrary(username, library);
                        initializeApp();
                    }
                };
                reader.readAsText(file);
            } else {
                library = getUserLibrary(username) || [];
                initializeApp();
            }
        }

        function initializeApp() {
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('app-container').style.display = 'grid';
            renderLibrary();
            setupAudioContext();
        }

        function logout() {
            if (currentUser) {
                saveUserLibrary(currentUser, library);
            }
            location.reload();
        }

        // Audio Setup
        function setupAudioContext() {
            try {
                const AudioContext = window.AudioContext || window.webkitAudioContext;
                audioContext = new AudioContext();
                
                sourceNode = audioContext.createMediaElementSource(videoEl);
                gainNode = audioContext.createGain();
                
                sourceNode.connect(gainNode);
                gainNode.connect(audioContext.destination);
            } catch (e) {
                console.log('Audio context error:', e);
            }
        }

        // Player Functions
        function loadTrack(index) {
            if (index < 0 || index >= library.length) return;
            
            currentTrackIndex = index;
            const track = library[index];
            
            npTitle.textContent = track.title || "Titre Inconnu";
            npArtist.textContent = track.artist || "Artiste Inconnu";
            
            if (track.url) {
                videoEl.src = track.url;
                videoEl.load();
                
                const isVideo = track.type && track.type.startsWith('video');
                if (isVideo) {
                    videoPlaceholder.style.display = 'none';
                    videoEl.style.display = 'block';
                } else {
                    videoPlaceholder.style.display = 'flex';
                    videoEl.style.display = 'none';
                }
            }

            highlightTrack();
            playTrack();
        }

        function playTrack() {
            if (audioContext && audioContext.state === 'suspended') {
                audioContext.resume();
            }
            
            videoEl.play().then(() => {
                isPlaying = true;
                playBtn.textContent = '⏸';
            }).catch(e => console.log('Play error:', e));
        }

        function togglePlay() {
            if (currentTrackIndex === -1 && library.length > 0) {
                loadTrack(0);
                return;
            }
            
            if (isPlaying) {
                videoEl.pause();
                isPlaying = false;
                playBtn.textContent = '▶';
            } else {
                playTrack();
            }
        }

        function nextTrack() {
            if (library.length === 0) return;
            let nextIndex = currentTrackIndex + 1;
            if (nextIndex >= library.length) nextIndex = 0;
            loadTrack(nextIndex);
        }

        function prevTrack() {
            if (library.length === 0) return;
            let prevIndex = currentTrackIndex - 1;
            if (prevIndex < 0) prevIndex = library.length - 1;
            loadTrack(prevIndex);
        }

        function seek(event) {
            const rect = document.getElementById('progress-bar').getBoundingClientRect();
            const pos = (event.clientX - rect.left) / rect.width;
            if (videoEl.duration) {
                videoEl.currentTime = pos * videoEl.duration;
            }
        }

        function setVolume(val) {
            videoEl.volume = val;
            if (gainNode) gainNode.gain.value = val;
        }

        // UI Functions
        function renderLibrary() {
            const container = document.getElementById('track-list-container');
            container.innerHTML = '';

            if (library.length === 0) {
                container.innerHTML = '<div style="padding: 40px; text-align: center; color: var(--text-muted);">Aucune musique. Cliquez sur + pour ajouter des fichiers.</div>';
                return;
            }

            library.forEach((track, index) => {
                const row = document.createElement('div');
                row.className = 'track-row';
                row.id = 'track-' + index;
                row.onclick = function() { loadTrack(index); };

                let duration = "0:00";
                if (track.duration) {
                    const m = Math.floor(track.duration / 60);
                    const s = Math.floor(track.duration % 60);
                    duration = m + ':' + (s < 10 ? '0' : '') + s;
                }

                row.innerHTML = '<div class="track-num">' + (index + 1) + '</div>' +
                    '<div class="track-icon">♫</div>' +
                    '<div class="track-info">' +
                    '<div class="track-title">' + (track.title || 'Sans titre') + '</div>' +
                    '<div class="track-artist">' + (track.artist || 'Inconnu') + '</div>' +
                    '</div>' +
                    '<div>' + (track.album || '-') + '</div>' +
                    '<div>' + duration + '</div>';
                container.appendChild(row);
            });
        }

        function highlightTrack() {
            document.querySelectorAll('.track-row').forEach(function(r) { 
                r.classList.remove('playing'); 
            });
            if (currentTrackIndex !== -1) {
                const el = document.getElementById('track-' + currentTrackIndex);
                if (el) {
                    el.classList.add('playing');
                    el.scrollIntoView({ behavior: 'smooth', block: 'center' });
                }
            }
        }

        function filterTracks(query) {
            const rows = document.querySelectorAll('.track-row');
            const q = query.toLowerCase();
            rows.forEach(function(row) {
                const text = row.textContent.toLowerCase();
                row.style.display = text.includes(q) ? 'grid' : 'none';
            });
        }

        function toggleLike() {
            const btn = document.getElementById('btn-like');
            if (btn.style.color === 'var(--danger)') {
                btn.style.color = 'var(--text-muted)';
            } else {
                btn.style.color = 'var(--danger)';
            }
        }

        function switchView(view) {
            document.querySelectorAll('.nav-item').forEach(function(el) { 
                el.classList.remove('active'); 
            });
            document.getElementById('nav-' + view).classList.add('active');
            
            if (view === 'favorites') {
                alert('Fonctionnalité Favoris: Filtrer par titres likés');
            } else {
                renderLibrary();
            }
        }

        function openSettings() {
            document.getElementById('settings-modal').style.display = 'flex';
        }

        function closeModal() {
            document.querySelectorAll('.modal-overlay').forEach(function(el) { 
                el.style.display = 'none'; 
            });
        }

        function exportLibrary(encrypt) {
            let dataStr, blob, filename;

            if (encrypt && userPassword) {
                dataStr = encryptData(library, userPassword);
                blob = new Blob([dataStr], { type: "application/octet-stream" });
                filename = 'zenkari_secure_' + new Date().toISOString().slice(0,10) + '.enc';
            } else {
                dataStr = JSON.stringify(library, null, 2);
                blob = new Blob([dataStr], { type: "application/json" });
                filename = 'zenkari_backup_' + new Date().toISOString().slice(0,10) + '.json';
            }
            
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = filename;
            a.click();
            
            const statusEl = document.getElementById('save-status');
            statusEl.textContent = 'Exportation réussie !';
            statusEl.className = "status-msg status-success";
            setTimeout(function() {
                statusEl.textContent = "";
                closeModal();
            }, 3000);
        }

        function addLocalFiles(files) {
            if (!files || files.length === 0) return;
            
            for (let i = 0; i < files.length; i++) {
                const file = files[i];
                const url = URL.createObjectURL(file);
                const type = file.type;
                const nameParts = file.name.split('.');
                const name = nameParts.length > 1 ? nameParts.slice(0, -1).join('.') : file.name;

                library.push({
                    title: name,
                    artist: "Fichier Local",
                    album: "Import",
                    url: url,
                    type: type,
                    duration: 0
                });
            }
            renderLibrary();
            if (currentUser) saveUserLibrary(currentUser, library);
            alert(files.length + ' fichier(s) ajouté(s)');
        }

        // Event Listeners
        videoEl.addEventListener('timeupdate', function() {
            if (videoEl.duration) {
                const pct = (videoEl.currentTime / videoEl.duration) * 100;
                progressFill.style.width = pct + '%';
                currTimeEl.textContent = formatTime(videoEl.currentTime);
                totalTimeEl.textContent = formatTime(videoEl.duration);
            }
        });

        videoEl.addEventListener('ended', nextTrack);

        function formatTime(seconds) {
            if (!seconds || isNaN(seconds)) return '0:00';
            const m = Math.floor(seconds / 60);
            const s = Math.floor(seconds % 60);
            return m + ':' + (s < 10 ? '0' : '') + s;
        }

        // Close modal on outside click
        window.onclick = function(event) {
            if (event.target.classList.contains('modal-overlay')) {
                closeModal();
            }
        };

        // Enter key for login
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Enter') {
                if (document.getElementById('login-screen').style.display !== 'none') {
                    attemptLogin();
                }
            }
        });
    </script>
</body>
</html>
